name: Build widget APK

# Builds a signed release APK of sp-today-widget and publishes it as a
# GitHub Release so Obtainium on the phone can auto-update from it. Must
# be signed with the SAME keystore as the SP fork, so the ContentProvider
# signature-level permission succeeds.
#
# Required secrets (identical to the SP fork):
#   ANDROID_KEYSTORE_BASE64
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs: {}

permissions:
  contents: write

concurrency:
  group: build-widget-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: true

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          ls -la keystore.jks

      - name: Assemble release APK
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          if [ -z "$APK" ]; then
            echo "No APK produced" >&2
            find app/build/outputs -name "*.apk" >&2 || true
            exit 1
          fi
          SIZE=$(du -h "$APK" | cut -f1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK ($SIZE)"

      - name: Compute release metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y%m%d-%H%M%S")
          TAG="widget-${DATE}-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +"%Y-%m-%d %H:%M UTC")" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sp-today-widget-release
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "Widget build ${{ steps.meta.outputs.date }}" \
            --notes "Automated signed release build of sp-today-widget.

          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}
          **APK size:** ${{ steps.apk.outputs.size }}
          **Built:** ${{ steps.meta.outputs.date }}

          Install on phone via Obtainium using this repo URL:
          \`https://github.com/${{ github.repository }}\`" \
            "${{ steps.apk.outputs.path }}"
